# Nginx site config for serving the Vite production build (no Docker).
#
# 1. Build on server:
#      cd /var/www/CareTracker-frontend
#      cp .env.production.example .env.production
#      nano .env.production   # set VITE_API_BASE_URL
#      npm ci && npm run build
#
# 2. Copy this file:
#      sudo cp deploy/nginx-caretracker.conf /etc/nginx/sites-available/caretracker
#      sudo ln -sf /etc/nginx/sites-available/caretracker /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;   # replace with your domain, e.g. app.caretracker.com

    root /var/www/CareTracker-frontend/dist;
    index index.html;

    # React Router — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Optional: proxy API through same domain (uncomment if backend is on same server)
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
