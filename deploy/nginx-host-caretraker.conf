# Host nginx for caretraker.com
# - Frontend: Docker admin container (production build) on port 5137
# - Backend API: Node on port 5000 (or 3000 — match your NODE_PORT in backend .env)
#
# Install:
#   sudo cp deploy/nginx-host-caretraker.conf /etc/nginx/sites-available/caretraker
#   sudo ln -sf /etc/nginx/sites-available/caretraker /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Before reload, verify:
#   docker ps                                    # caretracker-admin running
#   curl -I http://127.0.0.1:5137              # frontend → 200
#   curl -I http://127.0.0.1:5000/api/         # backend  → not 502 (use 3000 if that's your NODE_PORT)

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name caretraker.com www.caretraker.com;

    ssl_certificate /etc/letsencrypt/live/caretraker.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caretraker.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # API → backend (keep /api/ in the path — Express mounts routes at /api)
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React app → Docker nginx (production build, NOT Vite dev port 5173)
    location / {
        proxy_pass http://127.0.0.1:5137;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name caretraker.com www.caretraker.com;
    return 301 https://$host$request_uri;
}
